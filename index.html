<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Cursos</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>
    <!-- Background Animated Shapes -->
    <div class="bg-shape shape1"></div>
    <div class="bg-shape shape2"></div>
    <div class="bg-shape shape3"></div>

    <div class="container">
        
        <!-- Pantalla de Login -->
        <div id="login-screen" class="glass-panel active-screen">
            <div class="login-header">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-graduation-cap"></i>
                </div>
                <h1>Bienvenido</h1>
                <p>Ingresa para acceder a tus cursos</p>
            </div>
            <form id="login-form">
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="Correo electrónico" required autocomplete="off">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Contraseña" required>
                </div>
                <div id="error-message" class="error-msg hidden">Credenciales incorrectas</div>
                <div class="auth-buttons" style="display: flex; gap: 1rem; flex-direction: column;">
                    <button type="submit" class="btn-primary" id="btn-login">
                        Iniciar Sesión <i class="fa-solid fa-arrow-right"></i>
                    </button>
                    <button type="button" class="btn-secondary" id="btn-register" style="justify-content: center;">
                        Crear Cuenta Nueva
                    </button>
                </div>
            </form>
        </div>

        <!-- Pantalla de Panel/Cursos -->
        <div id="dashboard-screen" class="glass-panel hidden-screen">
            <header class="dashboard-header">
                <div>
                    <h2>Mis Cursos y Tutoriales</h2>
                    <p>Selecciona un módulo para continuar aprendiendo</p>
                </div>
                <button id="logout-btn" class="btn-secondary">
                    <i class="fa-solid fa-right-from-bracket"></i> Salir
                </button>
            </header>
            
            <div class="courses-grid" id="courses-container">
                <!-- Las tarjetas de cursos se inyectan dinámicamente desde script.js -->
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
